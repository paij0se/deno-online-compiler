  <body>
    <div>
      <h1>Execute your deno code</h1>
      <p>note: you only have --allow-net flag</p>
    </div>
    <div class="container p-3 justify-content-center">
      <div class="card">
        <div class="card-body">
          <!--code-->
          <div class="form-group">
            <textarea
              class="form-control"
              name="code"
              placeholder="put here your deno code"
              rows="10"
              id="code"
              spellcheck="false"
              required
            >
            </textarea>
            <h2 align="center">Mode</h2>
            <div align="center">
              <button
                type="button"
                class="btn btn-secondary"
                onclick="editor.setOption('keyMap', 'vim')"
              >
                <h1>vim</h1>
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                onclick="editor.setOption('keyMap', 'default')"
              >
                <h1>default</h1>
              </button>
            </div>
            <p><span id="command-display"></span></p>
            <p><span id="vim-mode"></span></p>
            <h2>
              Select a theme:
              <select onchange="selectTheme()" id="select">
                <option>default</option>
                <option>3024-day</option>
                <option>3024-night</option>
                <option>abbott</option>
                <option>abcdef</option>
                <option>ambiance</option>
                <option>ayu-dark</option>
                <option>ayu-mirage</option>
                <option>base16-dark</option>
                <option>base16-light</option>
                <option>bespin</option>
                <option>blackboard</option>
                <option>cobalt</option>
                <option>colorforth</option>
                <option>darcula</option>
                <option>dracula</option>
                <option>duotone-dark</option>
                <option>duotone-light</option>
                <option>eclipse</option>
                <option>elegant</option>
                <option>erlang-dark</option>
                <option>gruvbox-dark</option>
                <option>hopscotch</option>
                <option>icecoder</option>
                <option>idea</option>
                <option>isotope</option>
                <option>juejin</option>
                <option>lesser-dark</option>
                <option>liquibyte</option>
                <option>lucario</option>
                <option>material</option>
                <option selected>material-darker</option>
                <option>material-palenight</option>
                <option>material-ocean</option>
                <option>mbo</option>
                <option>mdn-like</option>
                <option>midnight</option>
                <option>monokai</option>
                <option>moxer</option>
                <option>neat</option>
                <option>neo</option>
                <option>night</option>
                <option>nord</option>
                <option>oceanic-next</option>
                <option>panda-syntax</option>
                <option>paraiso-dark</option>
                <option>paraiso-light</option>
                <option>pastel-on-dark</option>
                <option>railscasts</option>
                <option>rubyblue</option>
                <option>seti</option>
                <option>shadowfox</option>
                <option>solarized dark</option>
                <option>solarized light</option>
                <option>the-matrix</option>
                <option>tomorrow-night-bright</option>
                <option>tomorrow-night-eighties</option>
                <option>ttcn</option>
                <option>twilight</option>
                <option>vibrant-ink</option>
                <option>xq-dark</option>
                <option>xq-light</option>
                <option>yeti</option>
                <option>yonce</option>
                <option>zenburn</option>
              </select>
            </h2>
          </div>
          <script src="status.js"></script>
          <script src="getTheCode.js"></script>
          <script src="editor.js  "></script>
          <div align="center">
            <!--button-->
            <button class="btn" onclick="sendAndReceive()">
              <p>execute</p>
            </button>
          </div>
        </div>
      </div>
    </div>
    <h1>Output</h1>
    <div align="center">
      <pre id="output-code" tabindex="0"><code id="output"></code></pre>
      <h1>Api Status</h1>
      <pre id="api-status" tabindex="0"><code id="status"></code></pre>

        src="https://cdn.discordapp.com/emojis/720816736122961960.gif"
        width="128"
        height="128"
      />

        <a href="https://github.com/ELPanaJose/deno-online-compiler"
